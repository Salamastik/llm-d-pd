{{- /*
Optional HF token Secret manifest.
Equivalent to:
kubectl create secret generic ${HF_TOKEN_NAME} --from-literal="HF_TOKEN=${HF_TOKEN}"
*/ -}}
{{- $global := default (dict) .Values.global -}}
{{- $hfToken := get $global "hfToken" | default (get $global "HF_TOKEN") -}}
{{- $secretName := .Values.modelArtifacts.authSecretName | default (get $global "hfTokenName") | default (get $global "HF_TOKEN_NAME") -}}
{{- if and $hfToken $secretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName | quote }}
  labels:
    {{- include "llm-d-modelservice.labels" . | nindent 4 }}
type: Opaque
stringData:
  HF_TOKEN: {{ $hfToken | quote }}
{{- end }}
