inferenceExtension:
  image:
    name: llm-d-inference-scheduler
    hub: ghcr.io/llm-d
    tag: v0.5.0
    pullPolicy: Always

inferencePool:
  modelServerType: vllm
  apiVersion: inference.networking.k8s.io/v1
  modelServers:
    matchLabels:
      app: "qwen25-05b-cpu-demo"
      llm-d.ai/inference-serving: "true"
      llm-d.ai/guide: "pd-cpu-demo"
      llm-d.ai/model: "qwen2.5-0.5b-instruct"

provider:
  name: none

experimentalHttpRoute:
  enabled: false
  inferenceGatewayName: llm-d-infra-inference-gateway
