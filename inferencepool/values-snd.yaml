inferenceExtension:
  image:
    name: llm-d-inference-scheduler
    hub: ghcr.io/llm-d
    tag: v0.5.0
    pullPolicy: Always

inferencePool:
  modelServerType: vllm
  apiVersion: inference.networking.k8s.io/v1
  modelServers:
    matchLabels:
      # This key exists in the chart defaults and is merged, so it must match modelservice labels.
      # app: vllm-llama3-8b-instruct
      llm-d.ai/inference-serving: "true"
      llm-d.ai/guide: "pd-disaggregation"

provider:
  name: none

experimentalHttpRoute:
  enabled: false
  inferenceGatewayName: llm-d-infra-inference-gateway
